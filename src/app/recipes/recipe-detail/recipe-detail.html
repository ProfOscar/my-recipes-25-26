<!-- menù a discesa -->
<div class="row">
    <div class="col-xs-12">
        <div class="button-group" [ngClass]="{open: isDropdownOpen}">
            <button class="btn btn-primary dropdown-toggle" 
                (click)="isDropdownOpen = !isDropdownOpen" (blur)="isDropdownOpen = false">
                Manage Recipe
                <span class="caret"></span>
            </button>
            <ul class="dropdown-menu">
                <li><a (mousedown)="onToShoppingList()">To Shopping List</a></li>
                <li><a href="#">Edit Recipe</a></li>
                <li><a href="#">Delete Recipe</a></li>
            </ul>
        </div>
    </div>

    <div class="row">
        <div class="col-xs-12">
            <img [src]="recipeService.selectedRecipe?.imagePath" alt="Foto della ricetta" class="img-responsive">
        </div>
    </div>

    <div class="row">
        <div class="col-xs-12">
            <h1>{{recipeService.selectedRecipe?.name}}</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-xs-12 description">
            {{recipeService.selectedRecipe?.description}}
        </div>
    </div>

    <div class="row">
        <div class="col-xs-12">
            <h4>Ingredients</h4>
            @for (ingredient of recipeService.selectedRecipe?.ingredients; track $index) {
                <p class="ingredient">
                    <b>{{ingredient.name}}</b>: {{ingredient.amount}}
                </p>
            }
        </div>
    </div>
</div>
